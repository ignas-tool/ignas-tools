<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IGNAS Tools</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:#faf6f0;color:#2a2520;min-height:100vh;display:flex;align-items:center;justify-content:center}
.container{max-width:400px;width:100%;padding:20px}
h1{font-size:24px;text-align:center;margin-bottom:24px;color:#e86430}
.card{display:block;background:#fff;border:1.5px solid #e0d8d0;border-radius:14px;padding:20px;margin-bottom:12px;text-decoration:none;color:#2a2520;transition:all .2s;box-shadow:0 2px 8px rgba(42,37,32,.06)}
.card:active{transform:scale(.98)}
.card h2{font-size:16px;margin-bottom:4px}
.card p{font-size:13px;color:#6b6560}
.card .emoji{font-size:28px;float:right}
</style>
</head>
<body>
<div class="container">
  <h1>IGNAS Tools</h1>
  <a class="card" href="./fb/"><div class="emoji">📞</div><h2>FB Manager</h2><p>スタッフフィードバック記録・管理</p></a>
  <a class="card" href="./survey/"><div class="emoji">📋</div><h2>スタッフアンケート</h2><p>稼働後の簡易振り返り</p></a>
  <a class="card" href="./stamp/"><div class="emoji">⭐</div><h2>スタンプラリー</h2><p>スタンプ付与・管理・ランキング</p></a>
</div>
</body>
</html>
